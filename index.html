<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Rating · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green: #10b981;
        --green-dark: #059669;
        --green-light: #ecfdf5;
        --green-mid: #6ee7b7;
        --slate: #0f172a;
        --slate-mid: #475569;
        --slate-light: #94a3b8;
        --bg: #f0f4f8;
        --card: #ffffff;
        --border: #e8edf2;
        --red: #ef4444;
        --red-light: #fef2f2;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: var(--slate);
        -webkit-font-smoothing: antialiased;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .login-container {
        width: 100%;
        max-width: 400px;
        animation: fadeUp 0.4s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 24px;
        text-align: center;
      }

      .logo-mark {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, var(--green), var(--green-dark));
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
        margin-bottom: 12px;
      }

      .logo-mark svg {
        width: 24px;
        height: 24px;
        color: #fff;
      }

      .logo-title {
        font-family: "Sora", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--slate);
        line-height: 1.2;
      }

      .logo-sub {
        font-size: 12px;
        color: var(--slate-light);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: 4px;
      }

      .login-box {
        background: var(--card);
        border-radius: 18px;
        border: 1px solid var(--border);
        padding: 32px;
        box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05);
      }

      .login-box h2 {
        font-family: "Sora", sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--slate);
        margin-bottom: 24px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-group label {
        display: block;
        margin-bottom: 6px;
        color: var(--slate-mid);
        font-size: 13px;
        font-weight: 600;
      }

      .input-group input {
        width: 100%;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-family: inherit;
        color: var(--slate);
        background: var(--card);
        outline: none;
        transition: all 0.2s;
      }

      .input-group input:focus {
        border-color: var(--green-mid);
        box-shadow: 0 0 0 3px rgba(110, 231, 183, 0.2);
      }

      .login-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--green);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
      }

      .login-btn:hover {
        background: var(--green-dark);
        transform: translateY(-1px);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .message {
        margin-top: 16px;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        padding: 10px;
        border-radius: 8px;
        display: none;
        word-break: break-word;
      }

      /* Hidden state for regular form when autologin triggers */
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="brand-header">
        <div class="logo-mark">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </div>
        <div class="logo-title">Driver Rating</div>
        <div class="logo-sub">Management Portal</div>
      </div>

      <div class="login-box">
        <h2 id="loginTitle">Sign In</h2>

        <div class="message" id="message"></div>

        <form id="loginForm">
          <div class="input-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              required
            />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="login-btn">Log In</button>
        </form>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://vioupfkhpdyfbuatjtxr.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpb3VwZmtocGR5ZmJ1YXRqdHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTU0OTcsImV4cCI6MjA5MjkzMTQ5N30.KpQ3syRkSzCyPgkbeVX6OYY8pu13QshL-iQ2F48Vevk";

      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const msgEl = document.getElementById("message");
      const formEl = document.getElementById("loginForm");
      const titleEl = document.getElementById("loginTitle");

      // Inform Telegram that the app is ready
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // Optional: Expands app to full height inside Telegram
      }

      // 1. AUTO-LOGIN INITIALIZATION
      async function tryTelegramAutoLogin() {
        // Access data securely provided by Telegram container
        const tgData = window.Telegram?.WebApp?.initDataUnsafe;

        if (tgData && tgData.user && tgData.user.username) {
          const tgUsername = tgData.user.username;

          // Show user we are trying to log them in automatically
          titleEl.innerText = "Telegram Sync";
          formEl.classList.add("hidden");
          showStatus(
            `Detecting @${tgUsername}...`,
            "#f1f5f9",
            "var(--slate-mid)",
          );

          try {
            // Check if this specific Telegram username exists in your user_accounts table
            const { data, error } = await _supabase
              .from("user_accounts")
              .select("*")
              .eq("username", tgUsername);

            if (error) throw error;

            if (data && data.length > 0) {
              const user = data[0];

              // Log user in instantly (Skip password matching for verified Telegram App Context)
              localStorage.setItem("loggedUser", JSON.stringify(user));
              localStorage.setItem("userRole", user.role);

              showStatus(
                `Welcome back, ${user.full_name || username}! Redirecting...`,
                "var(--green-light)",
                "var(--green-dark)",
              );

              setTimeout(() => {
                window.location.href = "admin.html";
              }, 800);
            } else {
              // Account doesn't match an active row entry yet, restore normal form layout
              titleEl.innerText = "Sign In";
              formEl.classList.remove("hidden");
              showStatus(
                `Telegram user @${tgUsername} is not registered. Please log in manually.`,
                "var(--red-light)",
                "var(--red)",
              );
            }
          } catch (err) {
            console.error(err);
            titleEl.innerText = "Sign In";
            formEl.classList.remove("hidden");
            showStatus(
              "Auto-login error. clear manually.",
              "var(--red-light)",
              "var(--red)",
            );
          }
        }
      }

      // 2. FALLBACK MANUAL LOGIN
      async function manualLogin(username, password) {
        showStatus("Authenticating...", "#f1f5f9", "var(--slate-mid)");

        try {
          const { data, error } = await _supabase
            .from("user_accounts")
            .select("*")
            .eq("username", username);

          if (error) throw error;

          if (!data || data.length === 0) {
            showStatus("User not found", "var(--red-light)", "var(--red)");
            return;
          }

          const user = data[0];

          if (user.password_hash === password) {
            localStorage.setItem("loggedUser", JSON.stringify(user));
            localStorage.setItem("userRole", user.role);

            showStatus(
              "Login successful! Redirecting...",
              "var(--green-light)",
              "var(--green-dark)",
            );

            setTimeout(() => {
              window.location.href = "admin.html";
            }, 600);
          } else {
            showStatus("Wrong password", "var(--red-light)", "var(--red)");
          }
        } catch (error) {
          console.error(error);
          showStatus(
            `Error: ${error.message || JSON.stringify(error)}`,
            "var(--red-light)",
            "var(--red)",
          );
        }
      }

      // Helper for clean notification system
      function showStatus(text, bg, color) {
        msgEl.style.display = "block";
        msgEl.style.background = bg;
        msgEl.style.color = color;
        msgEl.innerText = text;
      }

      // Event listener for manual form submit
      formEl.addEventListener("submit", function (e) {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        manualLogin(username, password);
      });

      // Run automatic authentication scan as soon as document loads
      tryTelegramAutoLogin();
    </script>
  </body>
</html>
